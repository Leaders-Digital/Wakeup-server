# Nginx configuration for api.wakeup-cosmetics.tn
# Place this file in /etc/nginx/sites-available/ and create a symlink to /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name api.wakeup-cosmetics.tn;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.wakeup-cosmetics.tn;

    # SSL Configuration (update paths to your SSL certificates)
    ssl_certificate /etc/letsencrypt/live/api.wakeup-cosmetics.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.wakeup-cosmetics.tn/privkey.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Logs
    access_log /var/log/nginx/api.wakeup-cosmetics.tn.access.log;
    error_log /var/log/nginx/api.wakeup-cosmetics.tn.error.log;

    # Max upload size (for image uploads)
    client_max_body_size 50M;
    client_body_buffer_size 50M;

    # Proxy to Docker container on port 3007
    location / {
        proxy_pass http://localhost:3007;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts (increased for large uploads)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Cache bypass
        proxy_cache_bypass $http_upgrade;
        
        # Buffering (disabled for uploads)
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Body size (must match client_max_body_size)
        client_max_body_size 50M;
    }

    # Serve static uploads directly (optional - for better performance)
    location /uploads/ {
        alias /home/ubuntu/wakeup-backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://localhost:3007/health;
        access_log off;
    }
}

