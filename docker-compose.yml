version: '3.8'

services:
  wakeup-backend:
    image: bangov2/wakeup-backend:latest
    container_name: wakeup-backend
    ports:
      - "3007:7000"
    volumes:
      - ./uploads:/app/uploads
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

